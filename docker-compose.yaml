services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # host 5433 -> container 5432, avoids clashing with native Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build: ./backend-django
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db          # <-- service name, NOT localhost (container-to-container)
      DB_PORT: 5432
      MBTA_API_KEY: ${MBTA_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  node:
    build: ./backend-node
    environment:
      MBTA_API_KEY: ${MBTA_API_KEY}
    ports:
      - "8081:8081"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - django
      - node

volumes:
  pgdata: